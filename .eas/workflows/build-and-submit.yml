on:
  push:
    branches: ["master"]

jobs:
  build_ios:
    name: Build iOS app
    type: build
    params:
      platform: ios
      profile: production
  submit_ios:
    name: Submit iOS
    type: submit
    needs: [build_ios]
    params:
      platform: ios
      profile: production
      build_id: ${{ needs.build_ios.outputs.build_id }}
    env:
      EXPO_DEBUG: "1"
